                    desc: '奶盖冻成方块，撒茉莉花碎，入口即化，茉莉绿茶底的鲜灵被奶盖的醇厚包裹',
                    slogan: '「奶盖化开，茉莉盛开」',
                    score: '89%'
                },
                black: {
                    title: '焦糖布蕾珍珠',
                    flavors: ['焦糖布蕾', '珍珠', '焦糖香'],
                    desc: '布蕾与珍珠混合，焦糖香贯穿始终，经典红茶底的醇厚与焦糖的甜香相得益彰',
                    slogan: '「焦糖布蕾，奶茶灵魂伴侣」',
                    score: '93%'
                },
                tieguanyin: {
                    title: '铁观音奶酥粒',
                    flavors: ['奶酥粒', '铁观音粉末', '酥脆'],
                    desc: '奶酥粒裹铁观音粉末，入口酥脆，茶香在咀嚼中释放，铁观音茶底的空灵感被奶酥放大',
                    slogan: '「酥脆茶香，双重口感」',
                    score: '88%'
                },
                matcha: {
                    title: '抹茶芝士奶盖珠',
                    flavors: ['芝士奶盖珠', '抹茶粉', '咸甜交织'],
                    desc: '芝士奶盖制成珠子，裹抹茶粉，入口咸甜交织，抹茶茶底的微苦被芝士中和',
                    slogan: '「咸甜抹茶，芝士暴击」',
                    score: '94%'
                },
                white: {
                    title: '椰奶冻丁',
                    flavors: ['椰奶冻', '椰蓉', '椰香'],
                    desc: '椰奶冻成丁，裹椰蓉，入口绵密，椰香四溢，白毫银针的清甜与椰奶的醇厚形成层次',
                    slogan: '「椰奶冻丁，热带风情」',
                    score: '90%'
                }
            }
        };

        // 匹配描述映射
        const moodMap = {
            crunch: '💥 咀嚼解压党',
            chewy: '🫘 糯叽叽星人',
            smooth: '🌊 清爽顺滑派',
            filling: '🍚 饱腹养生组',
            refreshing: '🌿 清爽草本系',
            creamy: '🥛 浓郁乳香系'
        };

        const teaMap = {
            osmanthus: '桂花乌龙',
            jasmine: '茉莉绿茶',
            black: '经典红茶',
            tieguanyin: '铁观音',
            matcha: '抹茶',
            white: '白毫银针'
        };

        function generate() {
            const mood = document.getElementById('mood').value;
            const tea = document.getElementById('tea').value;
            const result = document.getElementById('result');

            if (!mood || !tea) {
                alert('请先选择"口感性格"和"茶底偏好"哦！');
                return;
            }

            const hit = flavorDB[mood]?.[tea];
            if (hit) {
                document.getElementById('resultTitle').textContent = hit.title;
                document.getElementById('resultFlavors').innerHTML = hit.flavors.map(f => 
                    `<span class="flavor-tag">#${f}</span>`
                ).join('');
                document.getElementById('resultDesc').textContent = hit.desc;
                document.getElementById('resultSlogan').textContent = hit.slogan;
                document.getElementById('resultScore').textContent = `口感匹配度 ${hit.score} · ${moodMap[mood]} × ${teaMap[tea]}`;
                result.classList.add('show');
            } else {
                // 如果该组合没有预设，显示相近推荐
                const fallback = flavorDB[mood]?.[Object.keys(flavorDB[mood])[0]];
                if (fallback) {
                    document.getElementById('resultTitle').textContent = `✨ ${fallback.title}（推荐适配）`;
                    document.getElementById('resultFlavors').innerHTML = fallback.flavors.map(f => 
                        `<span class="flavor-tag">#${f}</span>`
                    ).join('');
                    document.getElementById('resultDesc').textContent = fallback.desc + '（注：该组合为智能推荐，可尝试不同搭配）';
                    document.getElementById('resultSlogan').textContent = fallback.slogan;
                    document.getElementById('resultScore').textContent = `口感匹配度 ${fallback.score} · ${moodMap[mood]} × 相近茶底`;
                    result.classList.add('show');
                } else {
                    alert('暂无该组合的小料概念，试试其他选择吧！');
                }
            }

            // 更新计数
            const count = Object.values(flavorDB).reduce((acc, moodObj) => acc + Object.keys(moodObj).length, 0);
            document.getElementById('resultCount').textContent = `✨ 已生成 ${count} 款小料概念 · 覆盖 6 种口感 × 6 种茶底`;
        }
    </script>
</body>
</html>
