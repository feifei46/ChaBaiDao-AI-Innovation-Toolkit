<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 48px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 51, 153, 0.15);
            border: 1px solid rgba(0, 51, 153, 0.08);
        }

        .badge {
            display: inline-block;
            background: #003399;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #003399;
            margin-bottom: 4px;
        }

        .sub-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }

        .emoji-big {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #003399;
            display: block;
            margin-bottom: 6px;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid #d0dbe8;
            font-size: 15px;
            background: #f8faff;
            transition: 0.2s;
            margin-bottom: 16px;
            outline: none;
            color: #1a1a2e;
        }

        select:focus {
            border-color: #003399;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 51, 153, 0.12);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #003399;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            margin-bottom: 12px;
        }

        .btn:hover {
            background: #002277;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 51, 153, 0.25);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-light {
            background: #ffffff;
            color: #003399;
            border: 2px solid #003399;
            margin-bottom: 0;
        }

        .btn-light:hover {
            background: #e8f0fe;
            box-shadow: 0 8px 24px rgba(0, 51, 153, 0.15);
        }

        .result {
            margin-top: 24px;
            padding: 20px 24px;
            background: #f8faff;
            border-radius: 16px;
            display: none;
            border-left: 4px solid #003399;
            animation: fadeIn 0.4s ease;
        }

        .result.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h3 {
            font-size: 20px;
            color: #003399;
            margin-bottom: 4px;
        }

        .result .flavor-tag {
            display: inline-block;
            background: #e8f0fe;
            color: #003399;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 6px;
        }

        .result .desc {
            color: #333333;
            font-size: 14px;
            line-height: 1.6;
            margin: 8px 0;
        }

        .result .slogan {
            color: #666666;
            font-size: 13px;
            font-style: italic;
            margin: 6px 0;
        }

        .result .score {
            display: inline-block;
            background: #003399;
            color: #ffffff;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }

        .result .extra {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        /* ===== 自定义提示框 ===== */
        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeInOverlay 0.25s ease;
        }

        .toast-overlay.show {
            display: flex;
        }

        @keyframes fadeInOverlay {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .toast-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 32px 40px 28px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            animation: popIn 0.3s ease;
        }

        .toast-icon {
            font-size: 36px;
            margin-bottom: 12px;
            display: block;
        }

        .toast-title {
            font-size: 18px;
            font-weight: 600;
            color: #003399;
            margin-bottom: 6px;
        }

        .toast-message {
            font-size: 15px;
            color: #444444;
            line-height: 1.6;
            margin-bottom: 20px;
        }

            background: #003399;
            color: #ffffff;
            border: none;
            padding: 10px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;

            background: #002277;
        }

            transform: scale(0.96);
        }

        @media (max-width: 500px) {
            .card {
                padding: 24px 16px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toastOverlay').classList.add('show');
        }

        function closeToast() {
            document.getElementById('toastOverlay').classList.remove('show');
        }

            creamy: {

                    desc: '奶油制成大波波，裹桂花蜜，入口爆浆，奶香与桂花香在口中炸开，桂花乌龙茶底延展花香',
                    slogan: '「奶油炸弹，桂香轰炸」',

                },
                jasmine: {

                    slogan: '「奶盖化开，茉莉盛开」',

                },
                black: {
                    title: '焦糖布蕾珍珠',

                    slogan: '「酥脆茶香，双重口感」',
                    score: '88%'
                },
                matcha: {
                    title: '抹茶芝士奶盖珠',
                    flavors: ['芝士奶盖珠', '抹茶粉', '咸甜交织'],
                    desc: '芝士奶盖制成珠子，裹抹茶粉，入口咸甜交织，抹茶茶底的微苦被芝士中和',
                    slogan: '「咸甜抹茶，芝士暴击」',
                    score: '94%'
                },

                    title: '椰奶冻丁',
                    flavors: ['椰奶冻', '椰蓉', '椰香'],

                    slogan: '「椰奶冻丁，热带风情」',
                    score: '90%'

        const moodMap = {
            crunch: '脆爽爆破感',
            chewy: '绵密有嚼劲',
            smooth: '丝滑不腻',
            filling: '扎实有料',
            refreshing: '轻盈透亮',
            creamy: '醇厚绵密'
        };

        const teaMap = {
            osmanthus: '桂花乌龙',
            jasmine: '茉莉绿茶',
            black: '经典红茶',
            tieguanyin: '铁观音',
            matcha: '抹茶',
            white: '白毫银针'
        };

        // ===== 核心生成函数 =====
        function generateFromSelection(moodValue, teaValue, showToastOnError = true, isBlindbox = false) {
            const result = document.getElementById('result');

            // 盲盒模式不需要检查下拉菜单
            if (!isBlindbox && (!moodValue || !teaValue)) {
                if (showToastOnError) {
                    showToast('请先选择"口感性格"和"茶底偏好"哦！', '提示', '🧋');
                }
                return null;
            }

            // 如果是盲盒模式，随机取值
            if (isBlindbox) {
                const moodKeys = Object.keys(flavorDB);
                const teaKeys = ['osmanthus', 'jasmine', 'black', 'tieguanyin', 'matcha', 'white'];
                moodValue = moodKeys[Math.floor(Math.random() * moodKeys.length)];
                teaValue = teaKeys[Math.floor(Math.random() * teaKeys.length)];
                // 同步更新下拉菜单（让用户看到抽到了什么）
                document.getElementById('mood').value = moodValue;
                document.getElementById('tea').value = teaValue;
            }

            const hit = flavorDB[moodValue]?.[teaValue];
            let data = null;

            if (hit) {
                data = { ...hit };
                data.mood = moodValue;
                data.tea = teaValue;
            } else {
                const fallback = flavorDB[moodValue]?.[Object.keys(flavorDB[moodValue])[0]];
                if (fallback) {
                    data = { ...fallback };
                    data.mood = moodValue;
                    data.tea = teaValue;
                    data.isFallback = true;
                } else {
                    if (showToastOnError) {
                        showToast('暂无该组合的小料概念，试试其他选择吧！', '提示', '🧋');
                    }
                    return null;
                }
            }

            const extraHTML = isBlindbox ? '<div class="extra">🎉 盲盒揭晓！你抽到了：</div>' : '';

            document.getElementById('resultTitle').textContent = data.title;
            document.getElementById('resultFlavors').innerHTML = data.flavors.map(f =>
                `<span class="flavor-tag">#${f}</span>`
            ).join('');
            document.getElementById('resultDesc').textContent = data.desc + (data.isFallback ? '（推荐适配）' : '');
            document.getElementById('resultSlogan').textContent = data.slogan;
            document.getElementById('resultScore').textContent =
                `口感匹配度 ${data.score} · ${moodMap[moodValue]} × ${teaMap[teaValue]}`;
            document.getElementById('resultExtra').innerHTML = extraHTML;
            document.getElementById('result').classList.add('show');

            return data;
        }

        // ===== 生成小料 =====
        function generate() {
            const moodValue = document.getElementById('mood').value;
            const teaValue = document.getElementById('tea').value;
            generateFromSelection(moodValue, teaValue, true, false);
        }

        // ===== 盲盒模式 =====
        let blindboxTimer = null;

        function blindboxMode() {
            const result = document.getElementById('result');

            // 先隐藏结果
            result.classList.remove('show');

            // 显示盲盒动画
            document.getElementById('resultExtra').innerHTML = '';
            document.getElementById('resultTitle').textContent = '🎁 盲盒开启中...';
            document.getElementById('resultFlavors').innerHTML = '';
            document.getElementById('resultDesc').textContent = '3... 2... 1... 🎉';
            document.getElementById('resultSlogan').textContent = '';
            document.getElementById('resultScore').textContent = '';
            result.classList.add('show');

            if (blindboxTimer) clearTimeout(blindboxTimer);

            blindboxTimer = setTimeout(() => {
                // 直接调用生成函数，传入 isBlindbox = true
                generateFromSelection(null, null, false, true);
                blindboxTimer = null;
            }, 1200);
        }
    </script>
